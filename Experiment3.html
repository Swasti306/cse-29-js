<!DOCTYPE html>
<html>
<head>
    <title>DOM Manipulation</title>

    <style>
        body {
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .container {
            width: 400px;
            margin: 100px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            width: 80%;
            padding: 8px;
            margin-bottom: 15px;
        }

        button {
            padding: 8px 12px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        p {
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1 id="heading">Welcome to JavaScript Lab</h1>

        <input type="text" id="inputText" placeholder="Enter new heading text">

        <br>

        <button onclick="changeText()">Change Heading</button>
        <button onclick="changeColor()">Change Background</button>
        <button onclick="increaseFont()">Increase Font Size</button>
        <br>
        <button onclick="togglePara()">Show/Hide Paragraph</button>
        <button onclick="resetPage()">Reset</button>

        <p id="para">
            This is a sample paragraph. JavaScript events can dynamically change content.
        </p>
    </div>

    <script>
        function changeText() {
            let text = document.getElementById("inputText").value;
            document.getElementById("heading").innerHTML = text;
        }

        function changeColor() {
            document.body.style.backgroundColor = "#d4edda";
        }

        function increaseFont() {
            document.getElementById("heading").style.fontSize = "40px";
        }

        function togglePara() {
            let para = document.getElementById("para");

            if (para.style.display === "none") {
                para.style.display = "block";
            } else {
                para.style.display = "none";
            }
        }

        function resetPage() {
            document.getElementById("heading").innerHTML = "Welcome to JavaScript Lab";
            document.getElementById("inputText").value = "";
            document.getElementById("heading").style.fontSize = "32px";
            document.body.style.backgroundColor = "#f5f5f5";
            document.getElementById("para").style.display = "block";
        }
    </script>

</body>
</html>
