<!DOCTYPE html>
<html>
<head>
    <title>Student Result Calculator</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .box {
            width: 350px;
            margin: 100px auto;
            padding: 20px;
            border: 2px solid black;
            background-color: white;
        }

        h2 {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 5px;
            margin-bottom: 10px;
        }

        button {
            padding: 6px 10px;
            margin-bottom: 10px;
        }

        #result {
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>Student Result Calculator</h2>

        <label>Enter Number of Subjects</label>
        <input type="number" id="subjects" placeholder="e.g. 3">

        <button onclick="calculate()">Calculate Result</button>

        <div id="result"></div>
    </div>

    <script>
        function calculate() {
            let n = document.getElementById("subjects").value;

            if (n <= 0) {
                alert("Enter valid number of subjects");
                return;
            }

            let total = 0;

            for (let i = 1; i <= n; i++) {
                let marks = prompt("Enter marks for subject " + i + ":");
                marks = parseFloat(marks);

                total += marks;
            }

            let avg = total / n;

            let grade = "";
            let result = "";

            if (avg >= 75) {
                grade = "A";
                result = "PASS";
            } else if (avg >= 60) {
                grade = "B";
                result = "PASS";
            } else if (avg >= 50) {
                grade = "C";
                result = "PASS";
            } else {
                grade = "F";
                result = "FAIL";
            }

            document.getElementById("result").innerHTML = 
                "Total Marks: " + total + "<br>" +
                "Average Marks: " + avg.toFixed(2) + "<br>" +
                "Grade: " + grade + "<br>" +
                "Result: " + result;
        }
    </script>

</body>
</html>
